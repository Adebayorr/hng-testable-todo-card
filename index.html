<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card">
        <div class="first-parent-div">
            <div class="title-container">
                <label for="completed" aria-labelledby="task completion checkbox"><input type="checkbox" class="completion" name="completed" id="completed" data-testid="test-todo-complete-toggle"></label>
                <h1 class="title" data-testid="test-todo-title">HNG Level 0 Task</h1>
            </div>
            <strong class="status" data-testid="test-todo-status" aria-label="status">Pending</strong>
        </div>
        <div class="priority-container">
                <p class="priority">
                    Priority:
                    <strong data-testid="test-todo-priority" aria-label="priority">Low</strong>
                </p>
                <p class="due-date-title">
                    Due date:
                    <time datetime="2026-04-10" class="due-date" data-testid="test-todo-due-date">April 16, 2026</time>
                </p>
                <p class="countdown">
                    countdown
                    <time aria-live="polite" data-testid="test-todo-time-remaining"></time>
                </p>
            </div>
        </div>
        <p class="description" data-testid="test-todo-description">Completion and hosting of HNG Level 0 task and assurance of all requirements are fulfilled</p>
        <div class="buttons-and-tags">
            <ul role="list" class="tags" data-testid="test-todo-tags">
                <li class="tag" data-testid="test-todo-tag-work">#work</li>
                <li class="tag" data-testid="test-todo-tag-urgent">#urgent</li>
            </ul>
            <div class="btn-wrapper">
            <button class="edit-btn" data-testid="test-todo-edit-button" aria-label="edit button">Edit</button>
            <button class="delete-btn" data-testid="test-todo-delete-button" aria-label="delete button">Delete</button>
        </div>
        </div>
        
    </article>
    <div class="form-container">
        <form data-testid="test-todo-edit-form">
            <label for="title-input">title <input id="title-input" placeholder="title here..." type="text" data-testid="test-todo-edit-title-input" ></label>
            <label for="desc-input">description <textarea name="" id="desc-input" placeholder="Type task description" data-testid="test-todo-edit-description-input"></textarea></label>
            <select name="priority selection" id="priority" data-testid="test-todo-edit-priority-select">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <label for="due-date-input">Due date <input type="datetime-local" placeholder="Due date" id="due-date-input" data-testid="test-todo-edit-due-date-input" ></label>
            <button data-testid="test-todo-save-button" class="form-btn save">Save</button>
            <button data-testid="test-todo-cancel-button" class="form-btn cancel">Cancel</button>
        </form>
    </div>

    <script defer src="script.js"></script>
</body>
</html>
