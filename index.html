<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card">
        <h2 class="title" data-testid="test-todo-title">Peek-a-boo</h2>
        <p class="description" data-testid="test-todo-description">Lorem ipsum dolor, et ratione qui nihil voluptatum sapiente vel consequatur?</p>
        <strong class="priority" data-testid="test-todo-priority" aria-label="priority">Low</strong>
        <time datetime="2026-04-10" class="due_date" data-testid="test-todo-due-date">Next Week</time>
        <time data-testid="test-todo-time-remaining"></time>
        <strong class="status" data-testid="test-todo-status" aria-label="status">Pending</strong>
        <label for="completed">
            Completed:
            <input type="checkbox" class="completion" name="completed" id="completed" data-testid="test-todo-complete-toggle">
        </label>
        <ul role="list" class="tags" data-testid="test-todo-tags">
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
        </ul>
        <button class="edit_btn" data-testid="test-todo-edit-button" aria-label="edit button">Edit</button>
        <button class="delete_btn" data-testid="test-todo-delete-button" aria-label="delete button">Delete</button>
    </article>
    <script defer src="script.js"></script>
</body>
</html>
